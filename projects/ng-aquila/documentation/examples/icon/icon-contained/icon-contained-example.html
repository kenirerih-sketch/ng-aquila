<div class="icon-type-outer">
  <div class="icon-type-overview">
    <div class="icon-type-overview__row-label" style="font-weight: bold"></div>
    <div class="icon-type-overview__col-header">primary</div>
    <div class="icon-type-overview__col-header">secondary</div>
    <div class="icon-type-overview__col-header">accent-attention</div>
    <div class="icon-type-overview__col-header">accent-subtle</div>
  </div>
  <div class="icon-type-overview emphasis">
    <!-- contained -->
    <div class="icon-type-overview__row-label"></div>
    <!-- primary contained -->
    <nx-icon
      name="product-heart"
      contained="true"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- secondary contained -->
    <nx-icon
      type="secondary"
      name="product-heart"
      contained="true"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- accent-attention contained -->
    <nx-icon
      type="accent-attention"
      contained="true"
      accentColor="purple"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- accent-subtle contained -->
    <nx-icon
      type="accent-subtle"
      contained="true"
      accentColor="purple"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
  </div>

  <div class="icon-type-overview inverse">
    <!-- contained inverse -->
    <div class="icon-type-overview__row-label" style="font-weight: bold">
      Inverse
    </div>
    <!-- primary contained inverse -->
    <nx-icon
      inverse="true"
      name="product-heart"
      contained="true"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- secondary contained inverse -->
    <nx-icon
      inverse="true"
      type="secondary"
      name="product-heart"
      contained="true"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- accent-attention contained inverse -->
    <nx-icon
      inverse="true"
      type="accent-attention"
      contained="true"
      accentColor="purple"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- accent-subtle contained inverse -->
    <nx-icon
      inverse="true"
      type="accent-subtle"
      contained="true"
      accentColor="purple"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
  </div>
</div>
