<div class="icon-type-outer">
  <div class="icon-type-overview grid-header">
    <div class="icon-type-overview__row-label"></div>
    <div class="icon-type-overview__col-header">primary</div>
    <div class="icon-type-overview__col-header">secondary</div>
  </div>

  <div class="icon-type-overview subgrid">
    <div class="icon-type-overview__row-label"></div>
    <!-- primary emphasis -->
    <nx-icon
      emphasis="true"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- secondary emphasis -->
    <nx-icon
      type="secondary"
      emphasis="true"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
  </div>

  <div class="icon-type-overview inverse subgrid">
    <div class="icon-type-overview__row-label" style="font-weight: bold">
      Inverse
    </div>
    <!-- primary emphasis inverse -->
    <nx-icon
      inverse="true"
      emphasis="true"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- secondary emphasis inverse -->
    <nx-icon
      inverse="true"
      type="secondary"
      emphasis="true"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
  </div>
</div>
