<div class="icon-type-outer">
  <div class="icon-type-overview">
    <div class="icon-type-overview__row-label"></div>
    <div class="icon-type-overview__col-header">primary</div>
    <div class="icon-type-overview__col-header">secondary</div>
    <div class="icon-type-overview__col-header">accent-attention</div>
    <div class="icon-type-overview__col-header">accent-subtle</div>

    <!-- Not emphasis & not contained -->
    <div></div>
    <!-- primary -->
    <nx-icon name="product-heart" size="l" aria-hidden="true"></nx-icon>
    <!-- secondary -->
    <nx-icon
      type="secondary"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- accent attention -->
    <nx-icon
      type="accent-attention"
      accentColor="purple"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- accent subtle -->
    <nx-icon
      type="accent-subtle"
      accentColor="purple"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
  </div>

  <div class="icon-type-overview inverse">
    <div class="icon-type-overview__row-label" style="font-weight: bold">
      Inverse
    </div>
    <!-- primary -->
    <nx-icon
      inverse="true"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- secondary -->
    <nx-icon
      inverse="true"
      type="secondary"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- accent attention -->
    <nx-icon
      inverse="true"
      type="accent-attention"
      accentColor="purple"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
    <!-- accent subtle -->
    <nx-icon
      inverse="true"
      type="accent-subtle"
      accentColor="purple"
      name="product-heart"
      size="l"
      aria-hidden="true"
    ></nx-icon>
  </div>
</div>
