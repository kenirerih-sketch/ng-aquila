<div class="search-input">
  <nx-formfield>
    <input
      #searchInput
      placeholder="Search"
      nxInput
      (keyup)="onSearchKeyUp($event)"
      [(ngModel)]="searchTerm"
    />
    @if (searchTerm || mobile()) {
      <button
        nxPlainButton
        type="button"
        class="search-input__clear"
        (click)="resetSearchInput()"
        [attr.aria-label]="mobile() && !searchTerm ? 'Close search' : 'Clear search'"
      >
        <nx-icon name="close" aria-hidden="true"></nx-icon>
      </button>
    }
  </nx-formfield>
</div>
